name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: RLS tests (pgTAP)
        run: supabase test db

  db-security-integration:
    runs-on: ubuntu-latest
    needs: database
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Reset database
        run: supabase db reset
      - name: Export local Supabase keys
        run: |
          API_URL=$(supabase status -o json | jq -r '.API_URL')
          ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')
          SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "ALLOW_DESTRUCTIVE_TESTS=true" >> "$GITHUB_ENV"
          echo "SUPABASE_PROJECT_ID=SameLobby" >> "$GITHUB_ENV"
      - run: npm ci
      - name: RLS tests (pgTAP)
        run: npm run test:db
      - name: API P0
        run: npm run test:api:p0
      - name: Integration P0
        run: npm run test:integration:p0

  quality:
    runs-on: ubuntu-latest
    needs: [database, db-security-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Format check (changed files)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || echo "")"
          fi
          if [ -z "$BASE" ]; then
            echo "No base ref for format check; skipping."
            exit 0
          fi
          mapfile -t FILES < <(git diff --name-only --diff-filter=ACMRTUXB "$BASE" "$HEAD" | grep -E '\.(ts|tsx|js|mjs|cjs|json|md|yml|yaml|css|sql)$' || true)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No formatted files changed."
            exit 0
          fi
          npx prettier --check "${FILES[@]}"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"

  e2e:
    runs-on: ubuntu-latest
    needs: [database, quality]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: Export local Supabase keys
        run: |
          API_URL=$(supabase status -o json | jq -r '.API_URL')
          ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')
          SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: E2E tests
        run: npm run test:e2e
        env:
          SKIP_ENV_VALIDATION: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Accessibility tests
        run: npm run test:a11y
        env:
          SKIP_ENV_VALIDATION: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  env-production-gate:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Production env build without SKIP_ENV_VALIDATION
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SITE_URL: https://example.samelobby.com
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder
          CRON_SECRET: cron-placeholder
          SENTRY_DSN: https://example@sentry.io/0
          NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
